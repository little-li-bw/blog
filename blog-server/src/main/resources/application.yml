spring:
  application:
    name: blog-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

blog:
  security:
    jwt-secret: ${BLOG_JWT_SECRET}
    jwt-expiration-seconds: 86400
  upload:
    storage-path: uploads
    url-prefix: /uploads
